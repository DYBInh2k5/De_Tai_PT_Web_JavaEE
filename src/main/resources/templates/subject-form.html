<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Môn học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{padding-top:70px;background:#f8f9fa}.page-card{background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 6px rgba(0,0,0,.08)}</style>
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>
<div class="container"><div class="row justify-content-center"><div class="col-md-6">
<div class="page-card">
    <h2 th:text="${subject.id == null ? '➕ Thêm môn' : '✏️ Sửa môn'}"></h2>
    <form th:action="@{/subjects/save}" th:object="${subject}" method="post" novalidate>
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Mã môn *</label>
            <input class="form-control" th:field="*{subjectCode}" th:classappend="${#fields.hasErrors('subjectCode')}?'is-invalid'">
            <div class="invalid-feedback" th:errors="*{subjectCode}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Tên môn *</label>
            <input class="form-control" th:field="*{subjectName}" th:classappend="${#fields.hasErrors('subjectName')}?'is-invalid'">
            <div class="invalid-feedback" th:errors="*{subjectName}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Số tín chỉ *</label>
            <input type="number" min="1" max="10" class="form-control" th:field="*{credits}" th:classappend="${#fields.hasErrors('credits')}?'is-invalid'">
            <div class="invalid-feedback" th:errors="*{credits}"></div>
        </div>
        <button type="submit" class="btn btn-success">Lưu</button>
        <a th:href="@{/subjects}" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</div></div></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
