<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Môn học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{padding-top:70px;background:#f8f9fa}.page-card{background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 6px rgba(0,0,0,.08)}</style>
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>
<div class="container">
    <div class="page-card">
        <div class="d-flex justify-content-between mb-4">
            <h2>📖 Môn học</h2>
            <a th:href="@{/subjects/add}" class="btn btn-primary">+ Thêm môn</a>
        </div>
        <table class="table table-striped">
            <thead class="table-dark"><tr><th>Mã môn</th><th>Tên môn</th><th>Tín chỉ</th><th></th></tr></thead>
            <tbody>
            <tr th:each="s : ${subjects}">
                <td><strong th:text="${s.subjectCode}"></strong></td>
                <td th:text="${s.subjectName}"></td>
                <td th:text="${s.credits}"></td>
                <td class="text-end">
                    <a th:href="@{/subjects/edit/{id}(id=${s.id})}" class="btn btn-sm btn-warning">Sửa</a>
                    <form th:action="@{/subjects/delete/{id}(id=${s.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Xóa môn học?')">Xóa</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(subjects)}"><td colspan="4" class="text-center text-muted">Chưa có môn học.</td></tr>
            </tbody>
        </table>
    </div>
</div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
