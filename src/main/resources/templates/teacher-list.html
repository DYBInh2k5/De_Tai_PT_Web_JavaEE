<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giảng viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{padding-top:70px;background:#f8f9fa}.page-card{background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 6px rgba(0,0,0,.08)}</style>
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>
<div class="container">
    <div class="page-card">
        <div class="d-flex justify-content-between mb-4">
            <h2>👨‍🏫 Giảng viên</h2>
            <a th:href="@{/teachers/add}" class="btn btn-primary">+ Thêm GV</a>
        </div>
        <table class="table table-striped">
            <thead class="table-dark"><tr><th>Mã GV</th><th>Họ tên</th><th>Email</th><th></th></tr></thead>
            <tbody>
            <tr th:each="t : ${teachers}">
                <td><strong th:text="${t.teacherCode}"></strong></td>
                <td th:text="${t.fullName}"></td>
                <td th:text="${t.email}"></td>
                <td class="text-end">
                    <a th:href="@{/teachers/edit/{id}(id=${t.id})}" class="btn btn-sm btn-warning">Sửa</a>
                    <form th:action="@{/teachers/delete/{id}(id=${t.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Xóa giảng viên?')">Xóa</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(teachers)}"><td colspan="4" class="text-center text-muted">Chưa có giảng viên.</td></tr>
            </tbody>
        </table>
    </div>
</div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
