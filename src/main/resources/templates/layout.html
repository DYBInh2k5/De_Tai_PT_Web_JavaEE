<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Lớp học &amp; Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        .page-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <!-- NAVBAR FRAGMENT -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">🏫 Quản lý Trường học</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}">📊 Tổng quan</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/classes}">📚 Lớp học</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/students}">👨‍🎓 Sinh viên</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/teachers}">👨‍🏫 Giảng viên</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/subjects}">📖 Môn học</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/grades}">📝 Điểm</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/swagger-ui.html}" target="_blank">🔗 API</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- FLASH MESSAGES -->
    <div th:fragment="alerts" class="container mt-3">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
        </div>
    </div>

    <!-- PAGINATION — danh sách lớp -->
    <nav th:fragment="pagination-classes" th:if="${classPage != null and classPage.totalPages > 1}" aria-label="Phân trang lớp">
        <ul class="pagination justify-content-center flex-wrap">
            <li class="page-item" th:classappend="${classPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/classes(page=${classPage.number - 1}, size=${pageSize})}">« Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, classPage.totalPages - 1)}"
                th:classappend="${i == classPage.number} ? 'active'">
                <a class="page-link" th:href="@{/classes(page=${i}, size=${pageSize})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${classPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/classes(page=${classPage.number + 1}, size=${pageSize})}">Sau »</a>
            </li>
        </ul>
    </nav>

    <!-- PAGINATION — danh sách sinh viên (giữ bộ lọc) -->
    <nav th:fragment="pagination-students" th:if="${studentPage != null and studentPage.totalPages > 1}" aria-label="Phân trang sinh viên">
        <ul class="pagination justify-content-center flex-wrap">
            <li class="page-item" th:classappend="${studentPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/students(page=${studentPage.number - 1}, size=${pageSize}, classId=${selectedClassId}, keyword=${keyword})}">« Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, studentPage.totalPages - 1)}"
                th:classappend="${i == studentPage.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/students(page=${i}, size=${pageSize}, classId=${selectedClassId}, keyword=${keyword})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${studentPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/students(page=${studentPage.number + 1}, size=${pageSize}, classId=${selectedClassId}, keyword=${keyword})}">Sau »</a>
            </li>
        </ul>
    </nav>

    <!-- SCRIPTS FRAGMENT -->
    <div th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>
</html>
