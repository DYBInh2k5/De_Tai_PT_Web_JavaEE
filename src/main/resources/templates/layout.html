<!DOCTYPE html>
<!-- ============================================================
     layout.html: FILE GIAO DIEN CHUNG (Layout)
     - Dinh nghia cac "fragment" (manh ghep) de cac trang khac tai su dung
     - 2 fragment chinh: navbar (thanh dieu huong) va scripts (JS)
     ============================================================ -->
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Lớp học &amp; Sinh viên</title>
    <!-- Bootstrap 5.3 CSS: thu vien giao dien dep, tuong thich dien thoai -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        .page-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <!-- ============================================================
         FRAGMENT: thanh dieu huong (Navbar)
         th:fragment="navbar" -> cac trang khac goi bang:
         <nav th:replace="~{layout :: navbar}"></nav>
         ============================================================ -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <!-- th:href="@{/}": link to root URL (chuyen huong den /classes) -->
            <a class="navbar-brand fw-bold" th:href="@{/}"> Quản lý Trường học</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <!-- Link den danh sach lop hoc -->
                        <a class="nav-link" th:href="@{/classes}"> Lớp học</a>
                    </li>
                    <li class="nav-item">
                        <!-- Link den danh sach sinh vien -->
                        <a class="nav-link" th:href="@{/students}"> Sinh viên</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ============================================================
         FRAGMENT: scripts (JavaScript)
         th:fragment="scripts" -> cac trang khac goi bang:
         <div th:replace="~{layout :: scripts}"></div>
         ============================================================ -->
    <div th:fragment="scripts">
        <!-- Bootstrap JS bundle (can de navbar gập lại feed) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>
</html>
