<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        .page-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav th:replace="~{layout :: navbar}" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top"></nav>
    <div th:replace="~{layout :: alerts}"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="page-card">
                    <h2 th:text="${student.id == null ? '➕ Thêm Sinh viên' : '✏️ Sửa Sinh viên'}"></h2>
                    <hr>

                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                        <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                    </div>

                    <form th:action="@{/students/save}" th:object="${student}" method="post" novalidate>
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="studentCode" class="form-label fw-semibold">Mã sinh viên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="studentCode"
                                   th:field="*{studentCode}"
                                   th:classappend="${#fields.hasErrors('studentCode')} ? 'is-invalid'"
                                   placeholder="VD: SV001">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('studentCode')}" th:errors="*{studentCode}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="fullName" class="form-label fw-semibold">Họ tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="fullName"
                                   th:field="*{fullName}"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                   placeholder="VD: Nguyễn Văn A">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email"
                                   th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   placeholder="VD: example@email.com">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="classroomId" class="form-label fw-semibold">Lớp học</label>
                            <select class="form-select" id="classroomId" name="classroomId">
                                <option value="">-- Chưa có lớp --</option>
                                <option th:each="c : ${classes}"
                                        th:value="${c.id}"
                                        th:text="${c.classCode + ' - ' + c.className}"
                                        th:selected="${student.classroom != null and student.classroom.id == c.id}"></option>
                            </select>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success">💾 Lưu</button>
                            <a th:href="@{/students}" class="btn btn-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
