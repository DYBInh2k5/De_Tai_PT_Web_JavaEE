<!DOCTYPE html>
<!-- ============================================================
     student-list.html: TRANG DANH SACH SINH VIEN (co loc theo lop)
     URL: GET /students (tat ca) hoac GET /students?classId=1 (loc)
     Chuc nang: Hien thi bang sinh vien + bo loc dropdown
     ============================================================ -->
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        .page-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav th:replace="~{layout :: navbar}"></nav>

    <div class="container">
        <div class="page-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Danh sách Sinh viên</h2>
                <a th:href="@{/students/add}" class="btn btn-primary"> Thêm Sinh viên mới</a>
            </div>

            <!-- ============================================================
                 BO LOC SINH VIEN THEO LOP
                 Form GET gui ?classId=... den /students
                 Khi nhan "Lọc": trinh duyet gui GET /students?classId=X
                 Controller doc @RequestParam("classId") -> loc du lieu
                 ============================================================ -->
            <div class="card mb-4 border-0 bg-light">
                <div class="card-body py-3">
                    <form th:action="@{/students}" method="get" class="row g-3 align-items-center">
                        <div class="col-auto">
                            <label for="classFilter" class="col-form-label fw-semibold">Lọc theo lớp:</label>
                        </div>
                        <div class="col-auto">
                            <select name="classId" id="classFilter" class="form-select">
                                <!-- Lua chon mac dinh: xem tat ca -->
                                <option value="">-- Tất cả các lớp --</option>
                                <!-- Duyet danh sach lop de tao cac option
                                     th:selected: tu dong chon lop dang loc -->
                                <option th:each="c : ${classes}"
                                        th:value="${c.id}"
                                        th:text="${c.className}"
                                        th:selected="${c.id == selectedClassId}"></option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="btn btn-secondary">Lọc</button>
                            <a th:href="@{/students}" class="btn btn-outline-secondary">Xóa lọc</a>
                        </div>
                    </form>
                </div>
            </div>

            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Mã SV</th>
                        <th>Họ tên</th>
                        <th>Email</th>
                        <th>Lớp học</th>
                        <th class="text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- th:each="student : ${students}":
                         Vong lap qua danh sach sinh vien
                         Co the la tat ca hoac da loc theo lop -->
                    <tr th:each="student : ${students}">
                        <td th:text="${student.id}"></td>
                        <td><strong th:text="${student.studentCode}"></strong></td>
                        <td th:text="${student.fullName}"></td>
                        <td th:text="${student.email}"></td>
                        <td>
                            <!-- student.classroom.className:
                                 Duyet tu Student -> Classroom (quan he @ManyToOne)
                                 Hien thi ten lop hoac "Chưa gán lớp" neu khong co -->
                            <span th:if="${student.classroom != null}"
                                  class="badge bg-primary"
                                  th:text="${student.classroom.className}"></span>
                            <span th:if="${student.classroom == null}"
                                  class="badge bg-secondary">Chưa gán lớp</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/students/edit/{id}(id=${student.id})}"
                               class="btn btn-sm btn-warning">Sửa</a>
                            <form th:action="@{/students/delete/{id}(id=${student.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Xóa sinh viên này?')">Xóa</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="6" class="text-center text-muted py-4">Không tìm thấy sinh viên nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
