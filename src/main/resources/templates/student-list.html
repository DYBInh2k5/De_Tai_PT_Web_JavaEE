<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::section})}">
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Danh sách Sinh viên</h2>
        <a th:href="@{/students/add}" class="btn btn-primary">Thêm Sinh viên mới</a>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/students}" method="get" class="row g-3">
                <div class="col-auto">
                    <label for="classFilter" class="col-form-label">Lọc theo lớp:</label>
                </div>
                <div class="col-auto">
                    <select name="classId" id="classFilter" class="form-select">
                        <option value="">-- Tất cả các lớp --</option>
                        <option th:each="c : ${classes}" 
                                th:value="${c.id}" 
                                th:text="${c.className}"
                                th:selected="${c.id == selectedClassId}"></option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-secondary">Lọc</button>
                    <a th:href="@{/students}" class="btn btn-outline-secondary">Xóa lọc</a>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Mã SV</th>
            <th>Họ tên</th>
            <th>Email</th>
            <th>Lớp học</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="student : ${students}">
            <td th:text="${student.id}"></td>
            <td th:text="${student.studentCode}"></td>
            <td th:text="${student.fullName}"></td>
            <td th:text="${student.email}"></td>
            <td th:text="${student.classroom != null ? student.classroom.className : 'Chưa gán lớp'}"></td>
            <td>
                <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-sm btn-warning">Sửa</a>
                <a th:href="@{/students/delete/{id}(id=${student.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Bạn có chắc chắn muốn xóa sinh viên này?')">Xóa</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(students)}">
            <td colspan="6" class="text-center">Không tìm thấy sinh viên nào.</td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
