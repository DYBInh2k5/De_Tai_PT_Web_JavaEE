<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        .page-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav th:replace="~{layout :: navbar}" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top"></nav>
    <div th:replace="~{layout :: alerts}"></div>

    <div class="container">
        <div class="page-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>👨‍🎓 Danh sách Sinh viên</h2>
                <a th:href="@{/students/add}" class="btn btn-primary">+ Thêm Sinh viên mới</a>
            </div>

            <!-- Lọc theo lớp + tìm kiếm -->
            <div class="card mb-4 border-0 bg-light">
                <div class="card-body py-3">
                    <form th:action="@{/students}" method="get" class="row g-3 align-items-end">
                        <input type="hidden" name="page" value="0">
                        <div class="col-md-3">
                            <label for="classFilter" class="form-label fw-semibold">Lọc theo lớp</label>
                            <select name="classId" id="classFilter" class="form-select">
                                <option value="">-- Tất cả các lớp --</option>
                                <option th:each="c : ${classes}"
                                        th:value="${c.id}"
                                        th:text="${c.className}"
                                        th:selected="${c.id == selectedClassId}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="keyword" class="form-label fw-semibold">Tìm kiếm</label>
                            <input type="text" class="form-control" id="keyword" name="keyword"
                                   th:value="${keyword}" placeholder="Mã SV hoặc họ tên...">
                        </div>
                        <div class="col-md-2">
                            <label for="size" class="form-label fw-semibold">Số dòng/trang</label>
                            <select name="size" id="size" class="form-select">
                                <option th:value="5" th:selected="${pageSize == 5}">5</option>
                                <option th:value="10" th:selected="${pageSize == 10}">10</option>
                                <option th:value="20" th:selected="${pageSize == 20}">20</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn btn-secondary me-2">Áp dụng</button>
                            <a th:href="@{/students}" class="btn btn-outline-secondary">Xóa lọc</a>
                        </div>
                    </form>
                </div>
            </div>

            <p class="text-muted small" th:if="${studentPage != null}">
                Hiển thị <span th:text="${studentPage.numberOfElements}"></span> /
                <span th:text="${studentPage.totalElements}"></span> sinh viên
                (trang <span th:text="${studentPage.number + 1}"></span> /
                <span th:text="${studentPage.totalPages > 0 ? studentPage.totalPages : 1}"></span>)
            </p>

            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Mã SV</th>
                        <th>Họ tên</th>
                        <th>Email</th>
                        <th>Lớp học</th>
                        <th class="text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="student : ${studentPage.content}">
                        <td th:text="${student.id}"></td>
                        <td><strong th:text="${student.studentCode}"></strong></td>
                        <td th:text="${student.fullName}"></td>
                        <td th:text="${student.email}"></td>
                        <td>
                            <span th:if="${student.classroom != null}"
                                  class="badge bg-primary"
                                  th:text="${student.classroom.className}"></span>
                            <span th:if="${student.classroom == null}"
                                  class="badge bg-secondary">Chưa gán lớp</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/students/edit/{id}(id=${student.id})}"
                               class="btn btn-sm btn-warning">Sửa</a>
                            <form th:action="@{/students/delete/{id}(id=${student.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Bạn có chắc chắn muốn xóa sinh viên này?')">Xóa</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${studentPage == null or studentPage.totalElements == 0}">
                        <td colspan="6" class="text-center text-muted py-4">Không tìm thấy sinh viên nào.</td>
                    </tr>
                </tbody>
            </table>

            <nav th:replace="~{layout :: pagination-students}"></nav>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
