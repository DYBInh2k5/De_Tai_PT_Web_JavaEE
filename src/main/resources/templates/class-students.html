<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::section})}">
<body>
<section>
    <div class="mb-4">
        <h2>Sinh viên lớp: <span th:text="${classroom.className}"></span></h2>
        <p class="text-muted">Mã lớp: <span th:text="${classroom.classCode}"></span></p>
    </div>

    <table class="table table-bordered">
        <thead class="table-light">
        <tr>
            <th>Mã SV</th>
            <th>Họ tên</th>
            <th>Email</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="student : ${students}">
            <td th:text="${student.studentCode}"></td>
            <td th:text="${student.fullName}"></td>
            <td th:text="${student.email}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(students)}">
            <td colspan="3" class="text-center">Lớp này chưa có sinh viên.</td>
        </tr>
        </tbody>
    </table>
    
    <div class="mt-3">
        <a th:href="@{/classes}" class="btn btn-secondary">Quay lại danh sách lớp</a>
    </div>
</section>
</body>
</html>
