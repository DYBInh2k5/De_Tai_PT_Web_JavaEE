<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinh viên theo lớp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        .page-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav th:replace="~{layout :: navbar}" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top"></nav>
    <div th:replace="~{layout :: alerts}"></div>

    <div class="container">
        <div class="page-card">
            <div class="mb-4">
                <h2>👨‍🎓 Sinh viên lớp: <span class="text-primary" th:text="${classroom.className}"></span></h2>
                <p class="text-muted mb-0">
                    Mã lớp: <strong th:text="${classroom.classCode}"></strong>
                    <span th:if="${classroom.teacher != null}">
                        · GV: <strong th:text="${classroom.teacher.fullName}"></strong>
                    </span>
                </p>
            </div>

            <table class="table table-bordered align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Mã SV</th>
                        <th>Họ tên</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="student : ${students}">
                        <td><strong th:text="${student.studentCode}"></strong></td>
                        <td th:text="${student.fullName}"></td>
                        <td th:text="${student.email}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="3" class="text-center text-muted py-4">Lớp này chưa có sinh viên.</td>
                    </tr>
                </tbody>
            </table>

            <div class="mt-3 d-flex gap-2">
                <a th:href="@{/classes}" class="btn btn-secondary">← Quay lại danh sách lớp</a>
                <a th:href="@{/students/add}" class="btn btn-primary">+ Thêm sinh viên</a>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
