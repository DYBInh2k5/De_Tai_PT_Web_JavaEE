<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Lớp học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        .page-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav th:replace="~{layout :: navbar}" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top"></nav>
    <div th:replace="~{layout :: alerts}"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="page-card">
                    <h2 th:text="${classroom.id == null ? '➕ Thêm Lớp học' : '✏️ Sửa Lớp học'}"></h2>
                    <hr>
                    <form th:action="@{/classes/save}" th:object="${classroom}" method="post" novalidate>
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="classCode" class="form-label fw-semibold">Mã lớp <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="classCode"
                                   th:field="*{classCode}"
                                   th:classappend="${#fields.hasErrors('classCode')} ? 'is-invalid'"
                                   placeholder="VD: CNTT01">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('classCode')}" th:errors="*{classCode}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="teacherId" class="form-label fw-semibold">Giảng viên phụ trách</label>
                            <select class="form-select" id="teacherId" name="teacherId">
                                <option value="">-- Chưa gán --</option>
                                <option th:each="t : ${teachers}"
                                        th:value="${t.id}"
                                        th:text="${t.teacherCode + ' - ' + t.fullName}"
                                        th:selected="${classroom.teacher != null and classroom.teacher.id == t.id}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="className" class="form-label fw-semibold">Tên lớp <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="className"
                                   th:field="*{className}"
                                   th:classappend="${#fields.hasErrors('className')} ? 'is-invalid'"
                                   placeholder="VD: Công nghệ thông tin 01">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('className')}" th:errors="*{className}"></div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success">💾 Lưu</button>
                            <a th:href="@{/classes}" class="btn btn-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
