<!DOCTYPE html>
<!-- ============================================================
     class-form.html: FORM THEM / SUA LOP HOC
     URL: GET /classes/add (them) hoac GET /classes/edit/{id} (sua)
     Chuc nang: Form nhap ma lop va ten lop
     ============================================================ -->
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Lớp học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        .page-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav th:replace="~{layout :: navbar}"></nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="page-card">
                    <!-- Tieu de tu dong thay doi:
                         Neu classroom.id == null -> "Thêm Lớp học"
                         Neu classroom.id != null -> "Sửa Lớp học" -->
                    <h2 th:text="${classroom.id == null ? ' Thêm Lớp học' : ' Sửa Lớp học'}"></h2>
                    <hr>

                    <!-- th:action="@{/classes/save}" -> POST den /classes/save
                         th:object="${classroom}" -> binding voi doi tuong Classroom
                         method="post" -> gui du lieu bang POST -->
                    <form th:action="@{/classes/save}" th:object="${classroom}" method="post">
                        <!-- th:field="*{id}": hidden field luu ID khi sua
                             Neu them moi: id = null -> khong gui
                             Neu sua: id != null -> gui de biet cap nhat ai -->
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="classCode" class="form-label fw-semibold">
                                Mã lớp <span class="text-danger">*</span>
                            </label>
                            <!-- th:field="*{classCode}": binding 2 chieu
                                 - Khi them: o trong
                                 - Khi sua: tu dong dien san gia tri tu CSDL -->
                            <input type="text" class="form-control" id="classCode"
                                   th:field="*{classCode}" placeholder="VD: CNTT01" required>
                        </div>

                        <div class="mb-3">
                            <label for="className" class="form-label fw-semibold">
                                Tên lớp <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="className"
                                   th:field="*{className}" placeholder="VD: Công nghệ thông tin 01" required>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success"> Lưu</button>
                            <a th:href="@{/classes}" class="btn btn-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
