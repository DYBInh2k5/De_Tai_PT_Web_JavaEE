<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng quan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        .stat-card { border-radius: 8px; padding: 20px; color: white; }
        .page-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div th:replace="~{layout :: alerts}"></div>

    <div class="container">
        <h2 class="mb-4">📊 Tổng quan hệ thống</h2>

        <div class="row g-3 mb-4">
            <div class="col-md-4 col-6">
                <div class="stat-card bg-primary">
                    <div class="fs-4 fw-bold" th:text="${stats.totalClasses}">0</div>
                    <div>Lớp học</div>
                </div>
            </div>
            <div class="col-md-4 col-6">
                <div class="stat-card bg-success">
                    <div class="fs-4 fw-bold" th:text="${stats.totalStudents}">0</div>
                    <div>Sinh viên</div>
                </div>
            </div>
            <div class="col-md-4 col-6">
                <div class="stat-card bg-info">
                    <div class="fs-4 fw-bold" th:text="${stats.totalTeachers}">0</div>
                    <div>Giảng viên</div>
                </div>
            </div>
            <div class="col-md-4 col-6">
                <div class="stat-card bg-warning text-dark">
                    <div class="fs-4 fw-bold" th:text="${stats.totalSubjects}">0</div>
                    <div>Môn học</div>
                </div>
            </div>
            <div class="col-md-4 col-6">
                <div class="stat-card bg-secondary">
                    <div class="fs-4 fw-bold" th:text="${stats.totalGrades}">0</div>
                    <div>Bản ghi điểm</div>
                </div>
            </div>
            <div class="col-md-4 col-6">
                <div class="stat-card bg-dark">
                    <div class="fs-4 fw-bold"
                         th:text="${stats.averageScore != null ? #numbers.formatDecimal(stats.averageScore, 1, 2) : '—'}">—</div>
                    <div>Điểm TB (thang 10)</div>
                </div>
            </div>
        </div>

        <div class="page-card">
            <h4 class="mb-3">🏆 Top lớp đông sinh viên nhất</h4>
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Mã lớp</th>
                        <th>Tên lớp</th>
                        <th>Giảng viên</th>
                        <th class="text-center">Số SV</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${stats.topClassesByStudents}">
                        <td th:text="${c.classCode}"></td>
                        <td th:text="${c.className}"></td>
                        <td th:text="${c.teacherName}"></td>
                        <td class="text-center"><span class="badge bg-info text-dark" th:text="${c.studentCount}"></span></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(stats.topClassesByStudents)}">
                        <td colspan="4" class="text-muted text-center">Chưa có dữ liệu lớp học.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4 d-flex flex-wrap gap-2">
            <a th:href="@{/classes}" class="btn btn-outline-primary">Quản lý lớp</a>
            <a th:href="@{/students}" class="btn btn-outline-success">Quản lý sinh viên</a>
            <a th:href="@{/grades}" class="btn btn-outline-dark">Quản lý điểm</a>
            <a th:href="@{/swagger-ui.html}" class="btn btn-outline-secondary" target="_blank">Swagger API</a>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
