<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Điểm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{padding-top:70px;background:#f8f9fa}.page-card{background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 6px rgba(0,0,0,.08)}</style>
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>
<div class="container"><div class="row justify-content-center"><div class="col-md-6">
<div class="page-card">
    <h2 th:text="${grade.id == null ? '➕ Nhập điểm' : '✏️ Sửa điểm'}"></h2>
    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
        <div th:each="e : ${#fields.globalErrors()}" th:text="${e}"></div>
    </div>
    <form th:action="@{/grades/save}" th:object="${grade}" method="post" novalidate>
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Sinh viên *</label>
            <select name="studentId" class="form-select" required>
                <option value="">-- Chọn --</option>
                <option th:each="s : ${students}" th:value="${s.id}"
                        th:text="${s.studentCode + ' - ' + s.fullName}"
                        th:selected="${grade.student != null and grade.student.id == s.id}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Môn học *</label>
            <select name="subjectId" class="form-select" required>
                <option value="">-- Chọn --</option>
                <option th:each="sub : ${subjects}" th:value="${sub.id}"
                        th:text="${sub.subjectCode + ' - ' + sub.subjectName}"
                        th:selected="${grade.subject != null and grade.subject.id == sub.id}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Điểm (0–10) *</label>
            <input type="number" step="0.01" min="0" max="10" class="form-control" th:field="*{score}"
                   th:classappend="${#fields.hasErrors('score')}?'is-invalid'">
            <div class="invalid-feedback" th:errors="*{score}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Ngày thi</label>
            <input type="date" class="form-control" th:field="*{examDate}">
        </div>
        <button type="submit" class="btn btn-success">Lưu</button>
        <a th:href="@{/grades}" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</div></div></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
