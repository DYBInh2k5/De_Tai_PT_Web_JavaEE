<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Điểm số</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{padding-top:70px;background:#f8f9fa}.page-card{background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 6px rgba(0,0,0,.08)}</style>
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>
<div class="container">
    <div class="page-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>📝 Quản lý điểm</h2>
            <a th:href="@{/grades/add}" class="btn btn-primary">+ Nhập điểm</a>
        </div>
        <p class="text-muted" th:if="${averageScore != null}">
            Điểm trung bình hệ thống: <strong th:text="${#numbers.formatDecimal(averageScore, 1, 2)}"></strong> / 10
        </p>

        <form th:action="@{/grades}" method="get" class="row g-2 mb-3">
            <input type="hidden" name="page" value="0">
            <div class="col-md-6">
                <select name="studentId" class="form-select">
                    <option value="">-- Tất cả sinh viên --</option>
                    <option th:each="s : ${students}" th:value="${s.id}"
                            th:text="${s.studentCode + ' - ' + s.fullName}"
                            th:selected="${s.id == selectedStudentId}"></option>
                </select>
            </div>
            <div class="col-auto"><button type="submit" class="btn btn-secondary">Lọc</button></div>
        </form>

        <table class="table table-striped align-middle">
            <thead class="table-dark">
            <tr><th>Sinh viên</th><th>Môn</th><th>Điểm</th><th>Ngày thi</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:each="g : ${gradePage.content}">
                <td th:text="${g.student.studentCode + ' - ' + g.student.fullName}"></td>
                <td th:text="${g.subject.subjectName}"></td>
                <td><span class="badge bg-primary fs-6" th:text="${g.score}"></span></td>
                <td th:text="${g.examDate != null ? g.examDate : '—'}"></td>
                <td class="text-end">
                    <a th:href="@{/grades/edit/{id}(id=${g.id})}" class="btn btn-sm btn-warning">Sửa</a>
                    <form th:action="@{/grades/delete/{id}(id=${g.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Xóa điểm?')">Xóa</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${gradePage.totalElements == 0}"><td colspan="5" class="text-center text-muted">Chưa có điểm.</td></tr>
            </tbody>
        </table>

        <nav th:if="${gradePage.totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${gradePage.first}?'disabled'">
                    <a class="page-link" th:href="@{/grades(page=${gradePage.number-1},size=${pageSize},studentId=${selectedStudentId})}">«</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, gradePage.totalPages-1)}"
                    th:classappend="${i==gradePage.number}?'active'">
                    <a class="page-link" th:href="@{/grades(page=${i},size=${pageSize},studentId=${selectedStudentId})}" th:text="${i+1}"></a>
                </li>
                <li class="page-item" th:classappend="${gradePage.last}?'disabled'">
                    <a class="page-link" th:href="@{/grades(page=${gradePage.number+1},size=${pageSize},studentId=${selectedStudentId})}">»</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
