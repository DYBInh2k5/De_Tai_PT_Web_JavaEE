<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Lớp học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        .page-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav th:replace="~{layout :: navbar}" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top"></nav>
    <div th:replace="~{layout :: alerts}"></div>

    <div class="container">
        <div class="page-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>📚 Danh sách Lớp học</h2>
                <a th:href="@{/classes/add}" class="btn btn-primary">+ Thêm Lớp mới</a>
            </div>

            <p class="text-muted small" th:if="${classPage != null}">
                Hiển thị <span th:text="${classPage.numberOfElements}"></span> /
                <span th:text="${classPage.totalElements}"></span> lớp
                (trang <span th:text="${classPage.number + 1}"></span> /
                <span th:text="${classPage.totalPages > 0 ? classPage.totalPages : 1}"></span>)
            </p>

            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Mã lớp</th>
                        <th>Tên lớp</th>
                        <th>Giảng viên</th>
                        <th class="text-center">Số SV</th>
                        <th class="text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row : ${classPage.content}">
                        <td th:text="${row.id}"></td>
                        <td><strong th:text="${row.classCode}"></strong></td>
                        <td th:text="${row.className}"></td>
                        <td>
                            <span class="badge bg-secondary" th:text="${row.teacherName}"></span>
                        </td>
                        <td class="text-center">
                            <span class="badge bg-info text-dark" th:text="${row.studentCount}"></span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/classes/{id}/students(id=${row.id})}"
                               class="btn btn-sm btn-info">Xem SV</a>
                            <a th:href="@{/classes/edit/{id}(id=${row.id})}"
                               class="btn btn-sm btn-warning">Sửa</a>
                            <form th:action="@{/classes/delete/{id}(id=${row.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Bạn có chắc chắn muốn xóa lớp này? Sinh viên trong lớp sẽ được gỡ gán khỏi lớp.')">Xóa</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${classPage == null or classPage.totalElements == 0}">
                        <td colspan="6" class="text-center text-muted py-4">Chưa có lớp học nào.</td>
                    </tr>
                </tbody>
            </table>

            <nav th:replace="~{layout :: pagination-classes}"></nav>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
