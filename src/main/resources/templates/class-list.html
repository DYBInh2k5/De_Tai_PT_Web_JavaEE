<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Lớp học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        .page-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav th:replace="~{layout :: navbar}"></nav>

    <div class="container">
        <div class="page-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>📚 Danh sách Lớp học</h2>
                <a th:href="@{/classes/add}" class="btn btn-primary">+ Thêm Lớp mới</a>
            </div>

            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Mã lớp</th>
                        <th>Tên lớp</th>
                        <th class="text-center">Số SV</th>
                        <th class="text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="classroom : ${classes}">
                        <td th:text="${classroom.id}"></td>
                        <td><strong th:text="${classroom.classCode}"></strong></td>
                        <td th:text="${classroom.className}"></td>
                        <td class="text-center">
                            <span class="badge bg-info text-dark"
                                  th:text="${classroom.students != null ? classroom.students.size() : 0}"></span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/classes/{id}/students(id=${classroom.id})}"
                               class="btn btn-sm btn-info">Xem SV</a>
                            <a th:href="@{/classes/edit/{id}(id=${classroom.id})}"
                               class="btn btn-sm btn-warning">Sửa</a>
                            <form th:action="@{/classes/delete/{id}(id=${classroom.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Xóa lớp này? Sinh viên trong lớp sẽ được gỡ gán.')">Xóa</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(classes)}">
                        <td colspan="5" class="text-center text-muted py-4">Chưa có lớp học nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
