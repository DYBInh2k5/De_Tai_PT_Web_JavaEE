<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Giảng viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{padding-top:70px;background:#f8f9fa}.page-card{background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 6px rgba(0,0,0,.08)}</style>
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>
<div class="container"><div class="row justify-content-center"><div class="col-md-6">
<div class="page-card">
    <h2 th:text="${teacher.id == null ? '➕ Thêm GV' : '✏️ Sửa GV'}"></h2>
    <form th:action="@{/teachers/save}" th:object="${teacher}" method="post" novalidate>
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Mã GV *</label>
            <input class="form-control" th:field="*{teacherCode}" th:classappend="${#fields.hasErrors('teacherCode')}?'is-invalid'">
            <div class="invalid-feedback" th:errors="*{teacherCode}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Họ tên *</label>
            <input class="form-control" th:field="*{fullName}" th:classappend="${#fields.hasErrors('fullName')}?'is-invalid'">
            <div class="invalid-feedback" th:errors="*{fullName}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control" th:field="*{email}" th:classappend="${#fields.hasErrors('email')}?'is-invalid'">
            <div class="invalid-feedback" th:errors="*{email}"></div>
        </div>
        <button type="submit" class="btn btn-success">Lưu</button>
        <a th:href="@{/teachers}" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</div></div></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
