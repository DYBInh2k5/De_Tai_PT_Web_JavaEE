# ============================================================
# CAU HINH KET NOI SQL SERVER
# ============================================================
# URL ket noi: localhost:1433, database ClassroomDB
# encrypt=true & trustServerCertificate=true: bat buat voi SQL Server 2019+
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ClassroomDB;encrypt=true;trustServerCertificate=true
# Tai khoan SQL Server
spring.datasource.username=sa
# MAT KHAU - doi lai cho dung voi may cua ban
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================================
# CAU HINH JPA / HIBERNATE
# ============================================================
# ddl-auto=update: Hibernate tu dong tao/cap nhat bang khi chay
#   - create: xoa bang cu, tao moi (mat du lieu)
#   - update: them cot moi neu Entity thay doi (giu du lieu)
#   - validate: chi kiem tra, khong tao bang
#   - none: tat che do tu dong
spring.jpa.hibernate.ddl-auto=update

# show-sql: in cau SQL ra console de debug
spring.jpa.show-sql=true
# Format SQL dep hon
spring.jpa.properties.hibernate.format_sql=true

# Dialect: bao Hibernate biet dang dung SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ============================================================
# CAU HINH THYMELEAF (Template Engine)
# ============================================================
# Tat cache de xem thay doi ngay khi F5 (dev)
spring.thymeleaf.cache=false
# Ho tro tieng Viet
spring.thymeleaf.encoding=UTF-8

# ============================================================
# CAU HINH SERVER
# ============================================================
server.port=8080
# Cong mac dinh: http://localhost:8080
