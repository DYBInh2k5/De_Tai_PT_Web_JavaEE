# =============================================
# SQL Server Connection - ĐỔI password cho đúng
# =============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ClassroomDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=YourPassword123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =============================================
# JPA / Hibernate
# =============================================
# update: tự tạo/cập nhật bảng theo Entity (dùng khi dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# =============================================
# Thymeleaf
# =============================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# =============================================
# Server
# =============================================
server.port=8080
