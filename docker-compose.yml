# Chạy: docker compose up --build
# Truy cập: http://localhost:8080  |  Swagger: http://localhost:8080/swagger-ui.html
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: classroom-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-YourPassword123!}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" || exit 1"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  app:
    build: .
    container_name: classroom-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_PASSWORD: "${DB_PASSWORD:-YourPassword123!}"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data:
